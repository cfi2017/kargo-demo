---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  labels:
    app.kubernetes.io/component: kargo-demo-dev
    app.kubernetes.io/managed-by: helm-infra-argocd
    app.kubernetes.io/name: helm-infra-argocd
  annotations:
    kargo.akuity.io/authorized-stage: "kargo-demo:dev"
  name: kargo-demo-dev
  namespace: infra-argocd
spec:
  destination:
    namespace: kargo-demo-dev
    server: https://kubernetes.default.svc
  project: kargo-demo
  source:
    path: manifests/dev/
    repoURL: https://github.com/cfi2017/kargo-demo.git
    targetRevision: develop
  syncPolicy:
    automated: {}
