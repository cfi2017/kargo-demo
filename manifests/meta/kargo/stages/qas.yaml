apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: qas
  namespace: kargo-demo
  annotations:
    kargo.akuity.io/color: "#FFDE21"
spec:
  vars:
    - name: gitopsRepo
      value: git@github.com:cfi2017/kargo-demo.git
  requestedFreight:
    - origin:
        kind: Warehouse
        name: release
      sources:
        stages:
          - test
  promotionTemplate:
    spec:
      vars:
        - name: srcPath
          value: ./repo/charts/demo
        - name: outPath
          value: ./repo/manifests/${{ ctx.stage }}
        - name: tmpPath
          value: ./out
      steps:
        - uses: git-clone
          config:
            repoURL: ${{ vars.gitopsRepo }}
            checkout:
              - branch: main
                path: ./repo
        - uses: delete
          config:
            path: ${{ vars.outPath }}
        - uses: helm-template
          config:
            path: ${{ vars.srcPath }}
            outPath: ${{ vars.tmpPath }}
            outLayout: helm
            namespace: kargo-demo-${{ ctx.stage }}
            releaseName: ${{ ctx.stage }}
            valuesFiles:
              - ./repo/values/qas.yaml
            setValues:
              - key: image.tag
                value: ${{ imageFrom("ghcr.io/cfi2017/kargo-demo/server", warehouse("release")).Tag }}
        - uses: copy
          config:
            inPath: ${{ vars.tmpPath }}/demo/templates
            outPath: ${{ vars.outPath }}
        - uses: delete
          config:
            path: ${{ vars.tmpPath }}
        - uses: git-commit
          as: commit
          config:
            path: ./repo
            message: "chore(${{ ctx.stage }}): update manifests"
        - uses: git-push
          config:
            path: ./repo
        - uses: argocd-update
          config:
            apps:
              - name: kargo-demo-${{ ctx.stage }}
                sources:
                  - repoURL: https://github.com/cfi2017/kargo-demo.git
                    desiredRevision: ${{ outputs.commit.commit }}
                    updateTargetRevision: true
